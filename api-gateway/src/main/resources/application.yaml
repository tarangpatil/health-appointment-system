server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Public routes — no JWT required
            - id: user-register
              uri: lb://user-service        # lb:// means use Eureka load balancing
              predicates:
                - Path=/api/user/register
              filters:
                - RemoveRequestHeader=Cookie

            - id: user-login
              uri: lb://user-service
              predicates:
                - Path=/api/user/login
              filters:
                - RemoveRequestHeader=Cookie

            # Protected routes — JWT filter will apply
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/user/**

            - id: doctor-service
              uri: lb://doctor-service
              predicates:
                - Path=/api/doctor/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
